<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESIRE!!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#FF6B9D; --pink-dark:#C84B7D; --pink-light:#FFB3D1;
  --cream:#FFF8F0; --cream2:#FFE8D0; --gold:#FFD700;
  --text:#2C1A2E; --text-muted:#8B6080; --white:#FFFFFF;
  --green:#44CC77; --green-dark:#229944;
  --red:#FF4444;   --red-dark:#CC1111;
}
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Press Start 2P',monospace;background:var(--cream);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}
.screen{display:none;width:100vw;height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── SELECT ── */
#select-screen{background:var(--cream);padding:20px;gap:0;position:relative;overflow:hidden;}
#select-screen::before{content:'💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘💘';position:absolute;top:10px;left:0;right:0;text-align:center;font-size:20px;letter-spacing:4px;opacity:.15;pointer-events:none;}
#select-screen::after{content:none;}
.game-title{font-size:52px;color:var(--pink);text-shadow:4px 4px 0 var(--pink-dark),8px 8px 0 rgba(200,75,125,.2);letter-spacing:4px;margin-bottom:4px;animation:titlePulse 2s ease-in-out infinite;line-height:1;}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.game-subtitle{font-size:11px;color:var(--text-muted);margin-bottom:16px;letter-spacing:2px;}
.diff-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;}
.diff-label{font-size:8px;color:var(--text-muted);letter-spacing:2px;margin-right:4px;}
.diff-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:8px 14px;border:2px solid var(--text);background:var(--cream);color:var(--text);cursor:pointer;letter-spacing:1px;transition:all .1s;box-shadow:3px 3px 0 var(--text);}
.diff-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--text);}
.diff-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--text);}
.diff-btn.selected{color:#000;}
.diff-btn[data-diff="easy"].selected{background:var(--green);border-color:var(--green-dark);box-shadow:3px 3px 0 var(--green-dark);}
.diff-btn[data-diff="normal"].selected{background:var(--gold);border-color:#B8860B;box-shadow:3px 3px 0 #B8860B;}
.diff-btn[data-diff="hard"].selected{background:var(--red);border-color:var(--red-dark);box-shadow:3px 3px 0 var(--red-dark);color:#fff;}
.diff-song{font-family:'VT323',monospace;font-size:14px;color:var(--text-muted);letter-spacing:1px;}
.players-row{display:flex;gap:28px;align-items:flex-start;margin-bottom:16px;}
.player-card{background:var(--white);border:3px solid var(--text);box-shadow:6px 6px 0 var(--text);padding:18px 22px;width:290px;position:relative;}
.player-card::before{content:'';position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;border:1px solid var(--pink-light);pointer-events:none;}
.player-tag{font-size:9px;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.player-tag span{background:var(--text);color:var(--white);padding:2px 8px;font-size:8px;}
.char-preview{display:flex;justify-content:center;margin-bottom:12px;}
.char-preview canvas{border:2px solid var(--cream2);background:var(--cream);}
.section-mini{font-size:7px;letter-spacing:2px;color:var(--text-muted);margin-bottom:7px;text-transform:uppercase;}
.skin-row{display:flex;gap:10px;margin-bottom:14px;}
.skin-swatch{width:28px;height:28px;border:3px solid transparent;cursor:pointer;transition:transform .1s;position:relative;}
.skin-swatch:hover{transform:scale(1.15);}
.skin-swatch.selected{border-color:var(--text);box-shadow:2px 2px 0 var(--text);}
.skin-swatch::after{content:'';position:absolute;inset:0;border:1px solid rgba(0,0,0,.2);}
.damage-list{display:flex;flex-direction:column;gap:5px;}
.damage-btn{font-family:'VT323',monospace;font-size:18px;padding:7px 12px;border:2px solid var(--text);background:var(--cream);color:var(--text);cursor:pointer;text-align:left;letter-spacing:1px;transition:all .1s;box-shadow:3px 3px 0 var(--text);position:relative;overflow:hidden;}
.damage-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--text);}
.damage-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--text);}
.damage-btn.selected{background:var(--text);color:var(--gold);}
.damage-btn.selected::after{content:'◀';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;}
.vs-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding-top:50px;}
.vs-text{font-size:26px;color:var(--pink);text-shadow:3px 3px 0 var(--pink-dark);animation:vsPulse 1s ease-in-out infinite;}
@keyframes vsPulse{0%,100%{opacity:1}50%{opacity:.4}}
.heart-chain{font-size:18px;writing-mode:vertical-lr;letter-spacing:8px;opacity:.3;}
.start-btn{font-family:'Press Start 2P',monospace;font-size:18px;padding:16px 48px;background:var(--pink);color:var(--white);border:4px solid var(--text);box-shadow:6px 6px 0 var(--text);cursor:pointer;letter-spacing:3px;transition:all .1s;animation:startPulse 1.5s ease-in-out infinite;}
@keyframes startPulse{0%,100%{box-shadow:6px 6px 0 var(--text)}50%{box-shadow:8px 8px 0 var(--text),0 0 20px rgba(255,107,157,.4)}}
.start-btn:hover{background:var(--pink-dark);transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--text);animation:none;}
.start-btn:active{transform:translate(4px,4px);box-shadow:2px 2px 0 var(--text);}

/* ── GAME ── */
#game-screen{background:#000;position:relative;}
#main-canvas{display:block;image-rendering:pixelated;width:100vw;height:100vh;}
.game-ui{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:16px 20px;}
.game-top{display:flex;justify-content:space-between;align-items:flex-start;}
.game-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.hud-box{background:rgba(0,0,0,.75);border:2px solid var(--gold);padding:10px 16px;font-family:'VT323',monospace;font-size:20px;color:var(--gold);letter-spacing:1px;min-width:200px;}
.hud-box .label{font-size:11px;color:rgba(255,215,0,.6);font-family:'Press Start 2P',monospace;letter-spacing:2px;display:block;margin-bottom:2px;}
.timer-hud{background:rgba(0,0,0,.85);border:3px solid var(--pink);padding:10px 20px;text-align:center;font-size:40px;color:var(--pink);font-family:'Press Start 2P',monospace;min-width:100px;box-shadow:0 0 20px rgba(255,107,157,.4);}
.timer-hud.urgent{color:#FF3333;border-color:#FF3333;box-shadow:0 0 20px rgba(255,51,51,.5);animation:urgentFlash .5s ease-in-out infinite;}
@keyframes urgentFlash{0%,100%{opacity:1}50%{opacity:.6}}
.status-hud{position:absolute;top:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:2px solid var(--white);padding:7px 18px;font-family:'VT323',monospace;font-size:22px;color:var(--white);text-align:center;letter-spacing:1px;white-space:nowrap;pointer-events:none;}
.mute-btn{pointer-events:all;position:absolute;bottom:80px;right:20px;font-family:'Press Start 2P',monospace;font-size:11px;padding:8px 12px;background:rgba(0,0,0,.75);border:2px solid var(--gold);color:var(--gold);cursor:pointer;letter-spacing:1px;}
.mute-btn:hover{background:rgba(255,215,0,.15);}
.ctrl-cluster{pointer-events:all;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ctrl-cluster .ctrl-label{font-size:9px;color:var(--gold);letter-spacing:2px;font-family:'Press Start 2P',monospace;background:rgba(0,0,0,.7);padding:4px 8px;border:1px solid var(--gold);max-width:180px;text-align:center;line-height:1.5;}
.ctrl-btns{display:flex;gap:8px;}
.ctrl-btn{font-family:'Press Start 2P',monospace;font-size:20px;width:56px;height:56px;background:rgba(0,0,0,.8);border:2px solid var(--gold);color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;transition:all .08s;box-shadow:3px 3px 0 rgba(0,0,0,.5);}
.ctrl-btn:active,.ctrl-btn.pressed{background:var(--gold);color:#000;transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5);}

/* ── RESULT ── */
#result-screen{background:var(--cream);position:relative;overflow:hidden;}
#result-screen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,107,157,.05) 20px,rgba(255,107,157,.05) 22px);pointer-events:none;}
.result-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;max-width:700px;padding:40px;}
.result-box{background:var(--white);border:4px solid var(--text);box-shadow:8px 8px 0 var(--text);padding:32px 48px;width:100%;}
.result-emoji-big{font-size:72px;display:block;margin-bottom:8px;animation:resultBounce .6s ease-in-out;}
@keyframes resultBounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-title{font-size:20px;color:var(--pink);text-shadow:3px 3px 0 var(--pink-dark);margin-bottom:12px;line-height:1.5;}
.result-flavor{font-family:'VT323',monospace;font-size:24px;color:var(--text-muted);letter-spacing:1px;line-height:1.4;}
.result-combo-tag{font-size:9px;color:var(--text-muted);letter-spacing:2px;margin-top:8px;display:block;}
.result-btns{display:flex;gap:16px;}
.result-btn{font-family:'Press Start 2P',monospace;font-size:12px;padding:14px 24px;border:3px solid var(--text);box-shadow:5px 5px 0 var(--text);cursor:pointer;letter-spacing:2px;transition:all .1s;}
.result-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--text);}
.result-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--text);}
.result-btn.primary{background:var(--pink);color:var(--white);}
.result-btn.secondary{background:var(--cream);color:var(--text);}
#confetti-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;}
</style>
</head>
<body>

<!-- SELECT -->
<div id="select-screen" class="screen active">
  <div class="game-title">DESIRE!!</div>
  <div class="game-subtitle">pick your players!!</div>
  <div class="diff-row">
    <span class="diff-label">difficulty:</span>
    <button class="diff-btn" data-diff="easy">easy mode</button>
    <button class="diff-btn selected" data-diff="normal">normal</button>

  <div class="players-row">

        <div class="skin-swatch selected" data-p="1" data-skin="0" style="background:#8D5524;"></div>

      </div>

      </div>
    </div>
    <div class="vs-divider"><div class="vs-text">VS</div><div class="heart-chain">💘💘💘</div></div>
    <div class="player-card">
      <div class="player-tag"><span>P2</span> PLAYER TWO ♂</div>
      <div class="char-preview"><canvas id="c2" width="80" height="100" style="width:80px;height:100px;"></canvas></div>
      <div class="section-mini">skin tone</div>
      <div class="skin-row" id="skin2">
        <div class="skin-swatch selected" data-p="2" data-skin="0" style="background:#8D5524;"></div>
        <div class="skin-swatch" data-p="2" data-skin="1" style="background:#C68642;"></div>
        <div class="skin-swatch" data-p="2" data-skin="2" style="background:#FFD9B0;"></div>
      </div>
      <div class="section-mini">their damage</div>
      <div class="damage-list" id="att2">
        <button class="damage-btn selected" data-p="2" data-att="anxious">😰 Stage 5 Clinger</button>
        <button class="damage-btn" data-p="2" data-att="avoidant">🧊 Needs Space™</button>
        <button class="damage-btn" data-p="2" data-att="disorganized">🌀 Chaos Goblin</button>
      </div>
    </div>
  </div>
  <button class="start-btn" id="start-btn">▶ START GAME</button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <canvas id="main-canvas"></canvas>
  <div class="game-ui">
    <div class="game-top">
      <div class="hud-box"><span class="label">P1</span><span id="p1-hud-name">—</span></div>
      <div class="timer-hud" id="timer-hud">30</div>

    </div>

        <div class="ctrl-label">A / D keys</div>

          <button class="ctrl-btn" id="b-p1-left">←</button>
          <button class="ctrl-btn" id="b-p1-right">→</button>
        </div>
      </div>
      <div class="ctrl-cluster">
        <div class="ctrl-label">← / → keys</div>
        <div class="ctrl-btns">
          <button class="ctrl-btn" id="b-p2-left">←</button>
          <button class="ctrl-btn" id="b-p2-right">→</button>
        </div>
      </div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="result-inner">
    <div class="game-title" style="font-size:36px;">DESIRE!!</div>
    <div class="result-box">
      <span class="result-emoji-big" id="result-emoji">💔</span>
      <div class="result-title" id="result-title">—</div>
      <div class="result-flavor" id="result-flavor">—</div>
      <span class="result-combo-tag" id="result-combo-tag"></span>
    </div>
    <div class="result-btns">
      <button class="result-btn primary" id="play-again-btn">▶ PLAY AGAIN</button>
      <button class="result-btn secondary" id="new-chars-btn">↩ NEW PLAYERS</button>
    </div>
  </div>
</div>

<!-- AUDIO — rename your files to match these exactly -->
<audio id="audio-easy"   src="music-easy.mp3"   loop preload="none"></audio>
<audio id="audio-normal" src="music-normal.mp3" loop preload="none"></audio>
<audio id="audio-hard"   src="music-hard.mp3"   loop preload="none"></audio>
<audio id="sfx-win"      src="sfx-win.mp3"           preload="none"></audio>
<audio id="sfx-lose"     src="sfx-lose.mp3"          preload="none"></audio>

<script>
// ════════════════════════════════════════════════════════════
// DIFFICULTY CONFIG
// ════════════════════════════════════════════════════════════
const DIFF_CONFIG = {
  easy:{
    label:'easy mode', songLabel:'♪ Robot — tentenko', audioId:'audio-easy',
    gameDuration:45, inputForceP1:1.6, inputForceP2:2.0,
    anxiousStr:0.016, anxiousBothStr:0.012,
    avoidantFlee:0.004, avoidantBothFlee:0.003,
    chaosImpulse:8, chaosFlipMin:50, chaosFlipMax:120,
    maxSpeed:6, connectionDist:65, winThreshold:60, bg:'meadow'
  },
  normal:{
    label:'normal', songLabel:'♪ Wa Shoy! — tentenko', audioId:'audio-normal',
    gameDuration:30, inputForceP1:1.2, inputForceP2:1.6,
    anxiousStr:0.014, anxiousBothStr:0.008,
    avoidantFlee:0.007, avoidantBothFlee:0.007,
    chaosImpulse:14, chaosFlipMin:30, chaosFlipMax:80,
    maxSpeed:7, connectionDist:55, winThreshold:90, bg:'forest'
  },
  hard:{
    label:"dat's life", songLabel:'♪ Platonic Planet', audioId:'audio-hard',
    gameDuration:20, inputForceP1:0.8, inputForceP2:1.0,
    anxiousStr:0.018, anxiousBothStr:0.012,
    avoidantFlee:0.015, avoidantBothFlee:0.012,
    chaosImpulse:20, chaosFlipMin:15, chaosFlipMax:45,
    maxSpeed:9, connectionDist:45, winThreshold:120, bg:'city'
  }
};
let currentDiff='normal', cfg=DIFF_CONFIG.normal;

// ════════════════════════════════════════════════════════════
// AUDIO / SFX
// ════════════════════════════════════════════════════════════
let currentAudio=null, isMuted=false;

function playSFX(id){
  if(isMuted) return;
  const el=document.getElementById(id);
  if(!el) return;
  el.currentTime=0; el.volume=0.9;
  el.play().catch(()=>{});
}

function playMusic(audioId){
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
  if(isMuted) return;
  const el=document.getElementById(audioId);
  if(!el) return;
  el.volume=0.75; currentAudio=el;
  el.play().catch(()=>{});
}

function stopMusic(){if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}}

function fadeOutMusic(duration=1500){
  if(!currentAudio||isMuted) return;
  const audio=currentAudio, startVol=audio.volume, steps=30, stepTime=duration/steps;
  let step=0;
  const fade=setInterval(()=>{
    step++; audio.volume=Math.max(0,startVol*(1-step/steps));
    if(step>=steps){clearInterval(fade);audio.pause();audio.currentTime=0;audio.volume=startVol;}
  },stepTime);
}

document.getElementById('mute-btn').addEventListener('click',()=>{
  isMuted=!isMuted;
  document.getElementById('mute-btn').textContent=isMuted?'♪ unmute':'♪ mute';
  if(isMuted&&currentAudio) currentAudio.pause();
  else if(!isMuted&&currentAudio&&gameRunning) currentAudio.play().catch(()=>{});
});

// ════════════════════════════════════════════════════════════
// SKINS
// ════════════════════════════════════════════════════════════
const SKINS=[
  {base:'#8D5524',shadow:'#5C3010',hair:'#1A0A00'},
  {base:'#C68642',shadow:'#8B5E3C',hair:'#111111'},
  {base:'#FFD9B0',shadow:'#D4A574',hair:'#E8C84A'} // blonde
];

// ════════════════════════════════════════════════════════════
// CHARACTERS  (no face — head + hair + clothes)
// ════════════════════════════════════════════════════════════
function drawFemale(ctx,cx,cy,skinIdx,facingRight,animT,scale=1){
  const sk=SKINS[skinIdx],d=facingRight?1:-1;
  const bob=Math.sin(animT*.28)*(2.5*scale), ls=Math.sin(animT*.28)*(7*scale);
  ctx.save(); ctx.translate(cx,cy+bob); ctx.scale(scale,scale);
  const px=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x*d,y,w*d,h);};
  px(-6,22,5,14+ls/2,sk.base); px(1,22,5,14-ls/2,sk.base);
  px(-7,35+ls/2,7,5,'#333');   px(0,35-ls/2,7,5,'#333');
  ctx.fillStyle='#E86CA0';
  ctx.beginPath();ctx.moveTo(-12*d,3);ctx.lineTo(12*d,3);ctx.lineTo(18*d,28);ctx.lineTo(-18*d,28);ctx.closePath();ctx.fill();
  ctx.fillStyle='#C84B80';ctx.fillRect(-9*d,-7,18*d,11);
  px(-16,-5,7,11,sk.base);px(9,-5,7,11,sk.base);px(-17,4,5,5,sk.base);px(10,4,5,5,sk.base);
  ctx.fillStyle=sk.base;ctx.fillRect(-3*d,-12,6*d,7);
  ctx.fillStyle=sk.base;ctx.fillRect(-10*d,-30,20*d,20);
  ctx.fillStyle=sk.hair;
  ctx.fillRect(-11*d,-32,22*d,14);ctx.fillRect(-12*d,-30,5*d,18);ctx.fillRect(7*d,-30,5*d,18);
  ctx.restore();
}
function drawMale(ctx,cx,cy,skinIdx,facingRight,animT,scale=1){
  const sk=SKINS[skinIdx],d=facingRight?1:-1;
  const bob=Math.sin(animT*.28)*(2.5*scale), ls=Math.sin(animT*.28)*(7*scale);
  ctx.save(); ctx.translate(cx,cy+bob); ctx.scale(scale,scale);
  const px=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x*d,y,w*d,h);};
  px(-8,12,7,18+ls/2,'#1A3A7A');px(1,12,7,18-ls/2,'#1A3A7A');
  px(-9,10,18,3,'#333');px(-9,29+ls/2,9,5,'#222');px(0,29-ls/2,9,5,'#222');
  ctx.fillStyle='#2277BB';ctx.fillRect(-10*d,-8,20*d,21);
  ctx.fillStyle='#1A5599';ctx.fillRect(-1*d,-8,2*d,21);
  px(-16,-6,6,13,sk.base);px(10,-6,6,13,sk.base);px(-17,5,5,6,sk.base);px(11,5,5,6,sk.base);
  ctx.fillStyle=sk.base;ctx.fillRect(-3*d,-13,6*d,7);
  ctx.fillStyle=sk.base;ctx.fillRect(-11*d,-33,22*d,22);
  ctx.fillStyle=sk.hair;
  ctx.fillRect(-11*d,-35,22*d,10);ctx.fillRect(-12*d,-33,3*d,8);
  ctx.restore();
}

let flowers=[],mountains=[],clouds=[];
// forest: tall dark trees, fireflies
let trees=[],fireflies=[];
// city: buildings, neon signs, puddles
let buildings=[],signs=[],puddles=[];

const NEON_SIGNS=[
  {txt:'LOVE HOTEL',col:'#FF2299'},{txt:'24hr RAMEN',col:'#FF8800'},
  {txt:'KARAOKE ♪',col:'#00FFCC'},{txt:'OPEN',col:'#FF3333'},
  {txt:'CASINO',col:'#FFDD00'},{txt:'★ MOTEL ★',col:'#FF44FF'},
  {txt:'PACHINKO',col:'#00CCFF'},{txt:'BAR',col:'#FF6600'},
  {txt:'GIRLS GIRLS',col:'#FF1166'},{txt:'NOODLES',col:'#FFAA00'},
];

function genScene(W,H){
  // MEADOW
  flowers=Array.from({length:65},()=>({
    x:Math.random()*W,y:H*.65+Math.random()*(H*.3),
    type:Math.floor(Math.random()*5),size:5+Math.random()*6,
    color:['#FF6B9D','#FFD700','#FF8C42','#9B59B6','#FF4466','#00CEC9','#E84393'][Math.floor(Math.random()*7)],
    sway:Math.random()*Math.PI*2
  }));
  mountains=[
    {x:W*.05,h:H*.22,w:W*.18,c:'#8BA0BB'},{x:W*.22,h:H*.16,w:W*.14,c:'#A0B2C8'},
    {x:W*.62,h:H*.2, w:W*.2, c:'#8BA0BB'},{x:W*.80,h:H*.14,w:W*.15,c:'#A0B2C8'},
  ];
  clouds=Array.from({length:7},()=>({x:Math.random()*W,y:H*.04+Math.random()*H*.2,w:60+Math.random()*80,speed:.25+Math.random()*.4}));

  // FOREST
  trees=Array.from({length:18},()=>({
    x:Math.random()*W,
    trunkH:H*(.18+Math.random()*.22),
    trunkW:14+Math.random()*10,
    canopyR:35+Math.random()*30,
    dark:'#0A1A0A',mid:'#0D2A0D',lit:'#1A4A1A',
    sway:Math.random()*Math.PI*2,
    swaySpeed:.003+Math.random()*.004
  }));
  // sort back-to-front by height
  trees.sort((a,b)=>a.trunkH-b.trunkH);
  fireflies=Array.from({length:25},()=>({
    x:Math.random()*W, y:H*.3+Math.random()*H*.5,
    vx:(Math.random()-.5)*.6, vy:(Math.random()-.5)*.4,
    phase:Math.random()*Math.PI*2, brightness:0
  }));

  // CITY
  buildings=[];
  let bx=0;
  while(bx<W){
    const bw=40+Math.random()*80;
    const bh=H*(.25+Math.random()*.45);
    const baseCol=['#1A0A2E','#0A0A1A','#1A1A2E','#0E0A1A','#160616'][Math.floor(Math.random()*5)];
    const windows=[];
    for(let wy=10;wy<bh-20;wy+=18){
      for(let wx=8;wx<bw-8;wx+=14){
        if(Math.random()<.55) windows.push({x:wx,y:wy,lit:Math.random()<.6,col:Math.random()<.3?'#FFEEAA':'#AADDFF'});
      }
    }
    buildings.push({x:bx,w:bw,h:bh,col:baseCol,windows});
    bx+=bw+2+Math.random()*10;
  }
  signs=Array.from({length:12},(_,i)=>{
    const ns=NEON_SIGNS[Math.floor(Math.random()*NEON_SIGNS.length)];
    return {x:Math.random()*(W-100)+50, y:H*.38+Math.random()*H*.2,
            txt:ns.txt, col:ns.col, pulse:Math.random()*Math.PI*2,
            pulseSpeed:.04+Math.random()*.06, on:true, flickerTimer:0};
  });
  puddles=Array.from({length:8},()=>({
    x:Math.random()*W, y:H*.78+Math.random()*H*.15,
    rx:20+Math.random()*40, ry:4+Math.random()*6
  }));
}

function drawMeadow(ctx,W,H,t){
  ctx.fillStyle='#A8DDFF';ctx.fillRect(0,0,W,H*.62);
  ctx.fillStyle='#C5EAD0';ctx.fillRect(0,H*.60,W,H*.05);
  mountains.forEach(m=>{
    ctx.fillStyle=m.c;ctx.beginPath();
    ctx.moveTo(m.x,H*.62);ctx.lineTo(m.x+m.w/2,H*.62-m.h);ctx.lineTo(m.x+m.w,H*.62);
    ctx.closePath();ctx.fill();
  });
  ctx.fillStyle='#6DC044';ctx.fillRect(0,H*.62,W,H*.38);
  ctx.fillStyle='#5AAD32';ctx.fillRect(0,H*.72,W,H*.28);
  ctx.fillStyle='#4E9A28';ctx.fillRect(0,H*.82,W,H*.18);
  ctx.fillStyle='#8B7355';
  ctx.beginPath();ctx.moveTo(W*.08,H*.95);ctx.quadraticCurveTo(W*.5,H*.59,W*.92,H*.95);
  ctx.lineTo(W*.97,H*.95);ctx.quadraticCurveTo(W*.5,H*.61,W*.03,H*.95);ctx.closePath();ctx.fill();
  clouds.forEach(cl=>{
    cl.x=(cl.x+cl.speed)%(W+cl.w);
    ctx.fillStyle='rgba(255,255,255,0.92)';
    [[0,0,cl.w,14],[cl.w*.1,-10,cl.w*.5,14],[cl.w*.35,-16,cl.w*.3,16],[-8,0,16,10],[cl.w-8,0,16,10]]
      .forEach(([ox,oy,ww,hh])=>ctx.fillRect(cl.x+ox-cl.w/2,cl.y+oy,ww,hh));
  });
  flowers.forEach(f=>{
    ctx.fillStyle='#2E7D1E';ctx.fillRect(f.x-1,f.y-f.size,2,f.size);
    ctx.fillStyle=f.color;
    if(f.type===0) ctx.fillRect(f.x-f.size/2,f.y-f.size-f.size/2,f.size,f.size);
    else if(f.type===1){
      for(let p=0;p<4;p++){const a=p*Math.PI/2;ctx.beginPath();ctx.arc(f.x+Math.cos(a)*f.size*.6,f.y-f.size+Math.sin(a)*f.size*.6,f.size*.45,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(f.x,f.y-f.size,f.size*.3,0,Math.PI*2);ctx.fill();
    } else if(f.type===2){ctx.beginPath();ctx.arc(f.x,f.y-f.size,f.size*.55,0,Math.PI*2);ctx.fill();}
    else if(f.type===3){for(let i=0;i<3;i++)ctx.fillRect(f.x-1+i*f.size*.3-f.size*.3,f.y-f.size-i*f.size*.3,f.size*.4,f.size*.5);}
    else{ctx.beginPath();ctx.moveTo(f.x,f.y-f.size*1.5);ctx.lineTo(f.x+f.size*.6,f.y-f.size*.5);ctx.lineTo(f.x-f.size*.6,f.y-f.size*.5);ctx.closePath();ctx.fill();}
  });
}

function drawForest(ctx,W,H,t){
  // deep night sky
  ctx.fillStyle='#050A14';ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='#FFFFFF';
  for(let i=0;i<80;i++){
    const sx=(i*137.5)%W, sy=(i*97.3)%( H*.55);
    const blink=Math.sin(t*.02+i)*0.5+0.5;
    ctx.globalAlpha=blink*.7+.1;
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;
  // moon
  const moonX=W*.78, moonY=H*.12;
  ctx.fillStyle='#FFFDE0';ctx.beginPath();ctx.arc(moonX,moonY,40,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#F0E860';ctx.beginPath();ctx.arc(moonX,moonY,38,0,Math.PI*2);ctx.fill();
  // moonlight halo
  ctx.save();
  const mg=ctx.createRadialGradient(moonX,moonY,38,moonX,moonY,180);
  mg.addColorStop(0,'rgba(255,255,200,0.18)');mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(moonX,moonY,180,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // ground — dark mossy
  ctx.fillStyle='#0A1A06';ctx.fillRect(0,H*.62,W,H*.38);
  ctx.fillStyle='#081508';ctx.fillRect(0,H*.72,W,H*.28);
  ctx.fillStyle='#060E04';ctx.fillRect(0,H*.82,W,H*.18);
  // moonlit path
  ctx.fillStyle='rgba(200,220,160,0.12)';
  ctx.beginPath();ctx.moveTo(W*.3,H*.95);ctx.quadraticCurveTo(W*.5,H*.6,W*.7,H*.95);
  ctx.lineTo(W*.75,H*.95);ctx.quadraticCurveTo(W*.5,H*.62,W*.25,H*.95);ctx.closePath();ctx.fill();
  // trees — back layer (dark silhouettes)
  trees.forEach(tr=>{
    const sway=Math.sin(t*tr.swaySpeed+tr.sway)*3;
    const by=H*.62, tx=tr.x;
    // trunk
    ctx.fillStyle='#050A03';
    ctx.fillRect(tx-tr.trunkW/2,by-tr.trunkH,tr.trunkW,tr.trunkH);
    // canopy — layered for depth
    [tr.dark,tr.mid,tr.lit].forEach((col,ci)=>{
      ctx.fillStyle=col;
      const r=tr.canopyR*(1-.15*ci);
      const cx2=tx+sway*(ci+1)*.6;
      const cy2=by-tr.trunkH-(ci*8);
      ctx.beginPath();ctx.arc(cx2,cy2,r,0,Math.PI*2);ctx.fill();
      // second canopy lobe
      ctx.beginPath();ctx.arc(cx2-r*.5,cy2+r*.3,r*.7,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx2+r*.5,cy2+r*.3,r*.7,0,Math.PI*2);ctx.fill();
    });
    // moonlit highlight on canopy
    ctx.save();ctx.globalAlpha=0.08;
    ctx.fillStyle='#FFFDE0';
    ctx.beginPath();ctx.arc(tx+sway-tr.canopyR*.25,by-tr.trunkH-tr.canopyR*.3,tr.canopyR*.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // fireflies
  fireflies.forEach(ff=>{
    ff.x+=ff.vx; ff.y+=ff.vy;
    ff.phase+=.04+Math.random()*.01;
    ff.brightness=Math.max(0,Math.sin(ff.phase));
    if(ff.x<0||ff.x>W) ff.vx*=-1;
    if(ff.y<H*.3||ff.y>H*.85) ff.vy*=-1;
    if(Math.random()<.02){ff.vx+=(Math.random()-.5)*.4;ff.vy+=(Math.random()-.5)*.3;}
    if(ff.brightness>0.3){
      ctx.save();ctx.globalAlpha=ff.brightness*.8;
      ctx.fillStyle='#AAFFAA';
      ctx.beginPath();ctx.arc(ff.x,ff.y,2.5,0,Math.PI*2);ctx.fill();
      // glow
      ctx.globalAlpha=ff.brightness*.25;
      ctx.fillStyle='#CCFFCC';
      ctx.beginPath();ctx.arc(ff.x,ff.y,8,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  });
  // ground fog wisps
  ctx.save();ctx.globalAlpha=0.07+Math.sin(t*.008)*.03;
  ctx.fillStyle='#A0C8A0';
  for(let i=0;i<5;i++){
    const fx=(i*W*.22+t*.3)%W;
    ctx.beginPath();ctx.ellipse(fx,H*.74,80+i*20,14,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawCity(ctx,W,H,t){
  // night sky — gradient from near-black to very dark purple
  ctx.fillStyle='#08040E';ctx.fillRect(0,0,W,H);
  // distant smoggy sky glow
  ctx.save();
  const sg=ctx.createLinearGradient(0,0,0,H*.5);
  sg.addColorStop(0,'rgba(30,0,50,0)');sg.addColorStop(1,'rgba(80,20,120,0.25)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*.6);
  ctx.restore();
  // buildings — back to front
  buildings.forEach(b=>{
    const by=H*.62;
    // building body
    ctx.fillStyle=b.col;ctx.fillRect(b.x,by-b.h,b.w,b.h);
    // slight edge highlight (neon bleed)
    ctx.save();ctx.globalAlpha=.08;
    ctx.fillStyle='#AA44FF';ctx.fillRect(b.x,by-b.h,2,b.h);
    ctx.restore();
    // windows
    b.windows.forEach(w=>{
      if(w.lit){
        ctx.fillStyle=w.col;
        const flicker=Math.random()<.002?0:1;
        ctx.globalAlpha=flicker*.7+.2;
        ctx.fillRect(b.x+w.x,by-b.h+w.y,8,10);
        ctx.globalAlpha=1;
      }
    });
  });
  // street / ground
  ctx.fillStyle='#100A18';ctx.fillRect(0,H*.62,W,H*.38);
  ctx.fillStyle='#0C0814';ctx.fillRect(0,H*.72,W,H*.28);
  // sidewalk
  ctx.fillStyle='#1A1228';ctx.fillRect(0,H*.82,W,H*.18);
  // road lines
  ctx.fillStyle='#FFEE00';ctx.globalAlpha=.4;
  for(let lx=0;lx<W;lx+=60) ctx.fillRect(lx+(t*.8%60)-60,H*.87,30,4);
  ctx.globalAlpha=1;
  // puddles — reflections
  puddles.forEach(pd=>{
    ctx.save();ctx.globalAlpha=.35;
    ctx.fillStyle='#1A0A30';
    ctx.beginPath();ctx.ellipse(pd.x,pd.y,pd.rx,pd.ry,0,0,Math.PI*2);ctx.fill();
    // reflection shimmer
    ctx.globalAlpha=.15+Math.sin(t*.05+pd.x)*.08;
    ctx.fillStyle='#AA44FF';
    ctx.beginPath();ctx.ellipse(pd.x,pd.y,pd.rx*.6,pd.ry*.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // neon signs
  signs.forEach(s=>{
    s.flickerTimer--;
    if(s.flickerTimer<=0){s.on=Math.random()>.08;s.flickerTimer=Math.floor(Math.random()*120)+10;}
    if(!s.on) return;
    s.pulse+=s.pulseSpeed;
    const glow=.7+Math.sin(s.pulse)*.3;
    ctx.save();
    // glow halo
    ctx.globalAlpha=glow*.4;
    ctx.shadowColor=s.col;ctx.shadowBlur=18;
    ctx.fillStyle=s.col;
    ctx.fillRect(s.x-4,s.y-18,s.txt.length*9+8,26);
    // sign bg
    ctx.shadowBlur=0;ctx.globalAlpha=glow*.9;
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(s.x-4,s.y-18,s.txt.length*9+8,26);
    // border
    ctx.strokeStyle=s.col;ctx.lineWidth=2;ctx.globalAlpha=glow;
    ctx.strokeRect(s.x-4,s.y-18,s.txt.length*9+8,26);
    // text
    ctx.fillStyle=s.col;ctx.font='bold 13px monospace';ctx.globalAlpha=glow;
    ctx.fillText(s.txt,s.x,s.y);
    ctx.restore();
  });
  // street lamps
  const lampPositions=[W*.1,W*.3,W*.5,W*.7,W*.9];
  lampPositions.forEach(lx=>{
    ctx.fillStyle='#2A2030';ctx.fillRect(lx-3,H*.6,6,H*.25);
    // lamp head
    ctx.fillStyle='#3A2840';ctx.fillRect(lx-10,H*.6,20,8);
    // light cone
    ctx.save();
    const lg=ctx.createRadialGradient(lx,H*.61,2,lx,H*.61,70);
    lg.addColorStop(0,'rgba(255,240,180,0.35)');lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.globalAlpha=.8;
    ctx.beginPath();ctx.moveTo(lx,H*.61);ctx.lineTo(lx-55,H*.78);ctx.lineTo(lx+55,H*.78);ctx.closePath();ctx.fill();
    ctx.restore();
  });
}

function drawBG(ctx,W,H,t){
  if(cfg.bg==='meadow') drawMeadow(ctx,W,H,t);
  else if(cfg.bg==='forest') drawForest(ctx,W,H,t);
  else drawCity(ctx,W,H,t);
}

// PHYSICS
// ════════════════════════════════════════════════════════════
let gameRunning=false,gameTime=30,timerInterval=null,rafId=null;
let connected=false,totalConnectionTime=0,frameT=0;
let heartParticles=[];
const ATT_NAMES={anxious:'Stage 5 Clinger',avoidant:'Needs Space™',disorganized:'Chaos Goblin'};

function applyBehavior(player,other,W,H){
  let ax=0,ay=0;
  const dx=other.x-player.x,dy=other.y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const bothAnxious=p1.att==='anxious'&&p2.att==='anxious';
  const bothAvoidant=p1.att==='avoidant'&&p2.att==='avoidant';
  if(player.att==='anxious'){
    if(player.overshotCooldown>0){player.overshotCooldown--;}
    else{
      const str=bothAnxious?Math.min(cfg.anxiousBothStr,4/Math.max(dist,1)):Math.min(cfg.anxiousStr,7/Math.max(dist,1));
      ax=dx*str;ay=dy*str*.5;
      const approachSpeed=-(player.vx*(dx/Math.max(dist,1)));
      if(bothAnxious&&dist<40&&approachSpeed<-2.5) player.overshotCooldown=40+Math.floor(Math.random()*30);
    }
  } else if(player.att==='avoidant'){
    if(bothAvoidant){
      const flee=Math.min(cfg.avoidantBothFlee,400/(dist*dist+1));
      ax=-dx*flee*1.2;ay=-dy*flee*.3;
      if(player.x<W*.12) ax+=.5; if(player.x>W*.88) ax-=.5;
      if(dist>W*.5) ax+=dx*.0008;
    } else {
      const flee=Math.min(cfg.avoidantFlee,700/(dist*dist+1));
      ax=-dx*flee*1.6;ay=-dy*flee*.4;
      if(player.x<W*.10) ax+=.35; if(player.x>W*.90) ax-=.35;
      if(player.att==='avoidant'&&other.att==='anxious'&&dist>W*.6) ax*=.4;
    }
  } else {
    player.chaosCooldown--;
    if(player.chaosCooldown<=0){
      player.chaosMode=Math.random()<.5?1:-1;
      player.chaosCooldown=cfg.chaosFlipMin+Math.floor(Math.random()*(cfg.chaosFlipMax-cfg.chaosFlipMin));
    }
    const cStr=Math.min(.01,5/Math.max(dist,1));
    ax=dx*cStr*player.chaosMode*1.4;ay=dy*cStr*player.chaosMode*.5;
    if(Math.random()<.055){ax+=(Math.random()-.5)*cfg.chaosImpulse;ay+=(Math.random()-.5)*(cfg.chaosImpulse*.35);}
    ax+=Math.sin(frameT*.05+player.x*.008)*.5;ay+=Math.cos(frameT*.04+player.y*.008)*.25;
    if(player.x<W*.08) ax+=.8; if(player.x>W*.92) ax-=.8;
  }
  return {ax,ay};
}

function updateChar(ch,other,W,H){
  const {ax,ay}=applyBehavior(ch,other,W,H);
  const inputForce=ch===p2?cfg.inputForceP2:cfg.inputForceP1;
  if(ch.btnL) ch.vx-=inputForce; if(ch.btnR) ch.vx+=inputForce;
  ch.vx+=ax;ch.vy+=ay;ch.vx*=.87;ch.vy*=.86;
  const maxV=ch.att==='disorganized'?cfg.maxSpeed+2:cfg.maxSpeed;
  ch.vx=Math.max(-maxV,Math.min(maxV,ch.vx));ch.vy=Math.max(-3,Math.min(3,ch.vy));
  ch.x+=ch.vx;ch.y+=ch.vy;
  const floorMin=H*.58,floorMax=H*.80;
  ch.y=Math.max(floorMin,Math.min(floorMax,ch.y));ch.x=Math.max(30,Math.min(W-30,ch.x));
  ch.animT+=(Math.abs(ch.vx)*.6+.4);
  if(ch.vx>.4) ch.face=1; else if(ch.vx<-.4) ch.face=-1;
}

function spawnHearts(x,y){
  for(let i=0;i<5;i++)
    heartParticles.push({x,y,vx:(Math.random()-.5)*3,vy:-2-Math.random()*3,life:60,maxLife:60,char:['💗','💞','💘','💓'][Math.floor(Math.random()*4)]});
}

// ════════════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════════════
function startGame(){
  cfg=DIFF_CONFIG[currentDiff];
  const canvas=document.getElementById('main-canvas');
  const W=window.innerWidth,H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  genScene(W,H);
  p1.x=W*.15;p1.y=H*.72;p1.vx=1.8;p1.vy=0;p1.animT=0;p1.btnL=false;p1.btnR=false;p1.face=1;
  p1.chaosMode=1;p1.chaosCooldown=40;p1.overshotCooldown=0;
  p2.x=W*.85;p2.y=H*.72;p2.vx=-1.8;p2.vy=0;p2.animT=0;p2.btnL=false;p2.btnR=false;p2.face=-1;
  p2.chaosMode=1;p2.chaosCooldown=60;p2.overshotCooldown=0;
  if(p1.att==='avoidant'){p1.vx=-2;p1.face=-1;} if(p2.att==='avoidant'){p2.vx=2;p2.face=1;}
  gameTime=cfg.gameDuration;gameRunning=true;connected=false;totalConnectionTime=0;frameT=0;heartParticles=[];
  const th=document.getElementById('timer-hud');
  th.textContent=gameTime;th.classList.remove('urgent');
  document.getElementById('status-hud').textContent='bring these lovebirds together!!';
  document.getElementById('p1-hud-name').textContent=ATT_NAMES[p1.att];
  document.getElementById('p2-hud-name').textContent=ATT_NAMES[p2.att];
  playMusic(cfg.audioId);
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!gameRunning) return;
    gameTime--;th.textContent=gameTime;
    if(gameTime<=5) th.classList.add('urgent');
    if(gameTime<=0) endGame();
  },1000);
  if(rafId) cancelAnimationFrame(rafId);
  function loop(){
    if(!gameRunning) return;
    rafId=requestAnimationFrame(loop);frameT++;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    drawBG(ctx,W,H,frameT);
    updateChar(p1,p2,W,H);updateChar(p2,p1,W,H);
    const dist=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const wasConnected=connected;connected=dist<cfg.connectionDist;
    if(connected){
      totalConnectionTime++;
      if(!wasConnected) spawnHearts((p1.x+p2.x)/2,(p1.y+p2.y)/2-40);
      document.getElementById('status-hud').textContent='💘 STAY TOGETHER!! 💘';
    } else if(wasConnected){
      document.getElementById('status-hud').textContent='💔 they drifted apart...';
    }
    if((p1.att==='disorganized'||p2.att==='disorganized')&&Math.random()<.15){
      ctx.save();ctx.globalAlpha=.06+Math.random()*.08;
      ctx.fillStyle=['#FF6B9D','#9B59B6','#FFD700','#00CEC9'][Math.floor(Math.random()*4)];
      ctx.fillRect(0,0,W,H);ctx.restore();
    }
    const ds=(x,y)=>{ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x,y+4,14,5,0,0,Math.PI*2);ctx.fill();ctx.restore();};
    ds(p1.x,p1.y+36);ds(p2.x,p2.y+36);
    drawFemale(ctx,p1.x,p1.y,p1.skin,p1.face>0,p1.animT,1.5);
    drawMale(ctx,p2.x,p2.y,p2.skin,p2.face>0,p2.animT,1.5);
    heartParticles=heartParticles.filter(h=>{
      h.x+=h.vx;h.y+=h.vy;h.vy+=.05;h.life--;
      ctx.save();ctx.globalAlpha=h.life/h.maxLife;
      ctx.font=`${16+Math.floor((1-h.life/h.maxLife)*8)}px sans-serif`;
      ctx.fillText(h.char,h.x,h.y);ctx.restore();
      return h.life>0;
    });
    if(connected){
      ctx.save();ctx.globalAlpha=.25+Math.sin(frameT*.2)*.1;
      const g=ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
      g.addColorStop(0,'#FF6B9D');g.addColorStop(.5,'#FFD700');g.addColorStop(1,'#FF6B9D');
      ctx.strokeStyle=g;ctx.lineWidth=3;ctx.setLineDash([6,6]);ctx.lineDashOffset=-frameT;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y-20);ctx.lineTo(p2.x,p2.y-20);ctx.stroke();ctx.restore();
    }
  }
  loop();
}

// ════════════════════════════════════════════════════════════
// END GAME + SFX
// ════════════════════════════════════════════════════════════
function endGame(){
  gameRunning=false;clearInterval(timerInterval);if(rafId)cancelAnimationFrame(rafId);
  fadeOutMusic(1200);
  const won=totalConnectionTime>cfg.winThreshold;
  // play SFX after short delay (music fade gives it room)
  setTimeout(()=>playSFX(won?'sfx-win':'sfx-lose'),400);
  const combo=p1.att+'+'+p2.att;
  const outcomes={
    'anxious+anxious':{e:'😵‍💫',t:'EMOTIONAL FUSION ACHIEVED',f:'two clingers. merged into one crying entity. they share a phone now.'},
    'anxious+avoidant':{e:'😭',t:'THE ETERNAL CHASE',f:'one sprinted toward. one bolted away. nobody won. everybody processed it in therapy.'},
    'avoidant+anxious':{e:'😭',t:'THE ETERNAL CHASE',f:'one sprinted toward. one bolted away. nobody won. everybody processed it in therapy.'},
    'avoidant+avoidant':{e:'🚀',t:'BOTH LEFT THE COUNTRY',f:'maximum distance achieved. they are now on different continents texting "lol same".'},
    'anxious+disorganized':{e:'🌪️',t:'COMPLETE PSYCHOLOGICAL BEDLAM',f:'one was chasing. the other had three breakdowns and a villain arc. tuesday.'},
    'disorganized+anxious':{e:'🌪️',t:'COMPLETE PSYCHOLOGICAL BEDLAM',f:'one was chasing. the other had three breakdowns and a villain arc. tuesday.'},
    'avoidant+disorganized':{e:'👻',t:'ONE OF THEM DISAPPEARED',f:'avoidant said "needs space". chaos goblin said "bet" and ceased to exist.'},
    'disorganized+avoidant':{e:'👻',t:'ONE OF THEM DISAPPEARED',f:'avoidant said "needs space". chaos goblin said "bet" and ceased to exist.'},
    'disorganized+disorganized':{e:'🌋',t:'CHAOS MODE: REALITY BROKE',f:'nobody knows what happened. the flowers are filing a police report. call a shaman.'},
  };
  const r=outcomes[combo]||{e:'💔',t:'TIME RAN OUT...',f:'so close. yet so emotionally unavailable.'};
  if(won){r.e='💞';r.t='CONNECTION ACHIEVED!!';r.f='they actually did it. against all odds. touch grass together, kings.';}
  document.getElementById('result-emoji').textContent=r.e;
  document.getElementById('result-title').textContent=r.t;
  document.getElementById('result-flavor').textContent=r.f;
  document.getElementById('result-combo-tag').textContent=`${ATT_NAMES[p1.att]} + ${ATT_NAMES[p2.att]} · ${cfg.label}`;
  if(won) runConfetti();
  showScreen('result-screen');
}

function runConfetti(){
  const c=document.getElementById('confetti-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const pieces=Array.from({length:130},()=>({
    x:Math.random()*c.width,y:-20,vx:(Math.random()-.5)*6,vy:2+Math.random()*4,
    color:['#FF6B9D','#FFD700','#9B59B6','#FF8C42','#00CEC9'][Math.floor(Math.random()*5)],
    size:6+Math.random()*8,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.2
  }));
  let cf=0;
  (function cloop(){
    if(cf++>200){ctx.clearRect(0,0,c.width,c.height);return;}
    ctx.clearRect(0,0,c.width,c.height);
    pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.rv;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);ctx.restore();});
    requestAnimationFrame(cloop);
  })();
}

// ════════════════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════════════════
function bindBtn(id,player,dir){
  const el=document.getElementById(id);
  const dn=()=>{if(dir==='L')player.btnL=true;else player.btnR=true;el.classList.add('pressed');};
  const up=()=>{player.btnL=false;player.btnR=false;el.classList.remove('pressed');};
  el.addEventListener('mousedown',dn);
  el.addEventListener('touchstart',e=>{e.preventDefault();dn();},{passive:false});
  el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
  el.addEventListener('touchend',up);el.addEventListener('touchcancel',up);
}
bindBtn('b-p1-left',p1,'L');bindBtn('b-p1-right',p1,'R');
bindBtn('b-p2-left',p2,'L');bindBtn('b-p2-right',p2,'R');
document.addEventListener('keydown',e=>{
  if(e.key==='a'||e.key==='A') p1.btnL=true;
  if(e.key==='d'||e.key==='D') p1.btnR=true;
  if(e.key==='ArrowLeft'){e.preventDefault();p2.btnL=true;document.getElementById('b-p2-left').classList.add('pressed');}
  if(e.key==='ArrowRight'){e.preventDefault();p2.btnR=true;document.getElementById('b-p2-right').classList.add('pressed');}
});
document.addEventListener('keyup',e=>{
  if(e.key==='a'||e.key==='A') p1.btnL=false;
  if(e.key==='d'||e.key==='D') p1.btnR=false;
  if(e.key==='ArrowLeft'){p2.btnL=false;document.getElementById('b-p2-left').classList.remove('pressed');}
  if(e.key==='ArrowRight'){p2.btnR=false;document.getElementById('b-p2-right').classList.remove('pressed');}
});
document.getElementById('start-btn').addEventListener('click',()=>{showScreen('game-screen');startGame();});
document.getElementById('play-again-btn').addEventListener('click',()=>{showScreen('game-screen');startGame();});
document.getElementById('new-chars-btn').addEventListener('click',()=>{stopMusic();showScreen('select-screen');});
window.addEventListener('resize',()=>{
  if(document.getElementById('game-screen').classList.contains('active')){
    const c=document.getElementById('main-canvas');
    c.width=window.innerWidth;c.height=window.innerHeight;
    genScene(window.innerWidth,window.innerHeight);
  }
});
</script>
